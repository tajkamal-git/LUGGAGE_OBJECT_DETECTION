<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SecureScan — Live Screening{% endblock %}</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%234DD8E8'/%3E%3Cstop offset='1' stop-color='%232563EB'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 4 L90 20 V48 C90 74 72 90 50 97 C28 90 10 74 10 48 V20 Z' fill='%230A0E16'/%3E%3Cpath d='M50 10 L84 24 V48 C84 70 68 85 50 91 C32 85 16 70 16 48 V24 Z' fill='url(%23g)'/%3E%3Cpath d='M34 50 L44 60 L68 36' stroke='%230A0E16' stroke-width='6' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 1.5 L21 5 V12 c0 6-4 9.5-9 10.5 C7 21.5 3 18 3 12 V5 Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M7.5 12 L10.5 15 L16.5 8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="brand-text">SecureScan</span>
    <span class="brand-sub">LUGGAGE SCREENING CONSOLE</span>
  </div>
  <div class="navbar-right">
    <button id="referenceGuideBtn" class="icon-toggle" title="Threat coverage reference guide">
      <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 11v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="8" r="0.9" fill="currentColor"/></svg>
    </button>
    <button id="soundToggle" class="icon-toggle" title="Toggle alert sound" aria-pressed="true">
      <svg class="ico-sound-on" viewBox="0 0 24 24" width="16" height="16"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><path d="M16.5 8.5a5 5 0 0 1 0 7" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
      <svg class="ico-sound-off" viewBox="0 0 24 24" width="16" height="16" style="display:none"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><path d="M16 9l5 6M21 9l-5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div id="modelStatusPill" class="model-pill model-pill-loading">
      <span class="pill-dot"></span><span id="modelStatusText">Checking engine…</span>
    </div>
  </div>
</nav>

<main class="app-shell">
  {% block content %}{% endblock %}
</main>

<!-- Toast notifications -->
<div id="toastStack" class="toast-stack" aria-live="polite"></div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" hidden>
  <button id="lightboxClose" class="lightbox-close" aria-label="Close">✕</button>
  <img id="lightboxImage" src="" alt="Full size scan result">
</div>

<!-- Reference Guide modal -->
<div id="referenceGuide" class="ref-modal" hidden>
  <div class="ref-modal-panel">
    <div class="ref-modal-header">
      <div>
        <span class="eyebrow">Honest coverage disclosure</span>
        <h2>Threat Detection Reference</h2>
      </div>
      <button id="referenceGuideClose" class="lightbox-close" aria-label="Close">✕</button>
    </div>
    <div class="ref-modal-body" id="referenceGuideBody">
      <p class="ref-loading">Loading…</p>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/screening.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
